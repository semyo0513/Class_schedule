      // ==========================================
      // Trip Swap Manager Component (Batch Trip Swapping)
      // ==========================================
      function TripSwapManager({ data, updateTableAndLogSwap }) {
        const [absentTeacher, setAbsentTeacher] = useState(data.teachers[0]?.name || "");
        const [date, setDate] = useState("2026-06-25");
        const [startPeriod, setStartPeriod] = useState(1);
        const [endPeriod, setEndPeriod] = useState(4);
        const [reason, setReason] = useState("");
        const [proposals, setProposals] = useState([]);

        const DAYS = ["월", "화", "수", "목", "금"];
        const dayIdx = useMemo(() => {
          const day = new Date(date).getDay();
          return (day === 0 || day === 6) ? 1 : day;
        }, [date]);

        useEffect(() => {
          if (data.teachers.length > 0 && !data.teachers.some(t => t.name === absentTeacher)) {
            setAbsentTeacher(data.teachers[0].name);
          }
        }, [data.teachers, absentTeacher]);

        const handleSearchSwaps = () => {
          if (!absentTeacher) return;
          
          const absentLessons = data.timetable.filter(
            t => t.teacher === absentTeacher && t.day === dayIdx && t.period >= startPeriod && t.period <= endPeriod
          );

          const generatedProposals = [];

          absentLessons.forEach(lesson => {
            const candidates = data.timetable.filter(
              t => t.grade === lesson.grade && t.classNum === lesson.classNum && !(t.day === lesson.day && t.period === lesson.period)
            );

            let bestMatch = null;

            for (let cand of candidates) {
              const isCandTeacherBusy = data.timetable.some(
                t => t.teacher === cand.teacher && t.day === lesson.day && t.period === lesson.period
              );
              const isAbsentTeacherBusy = data.timetable.some(
                t => t.teacher === absentTeacher && t.day === cand.day && t.period === cand.period
              );

              const isRoomABusy = lesson.room && (lesson.room.includes("실") || lesson.room.includes("관") || lesson.room.startsWith("R5")) && data.timetable.some(t => (t.room === lesson.room || t.room === data.rooms.find(rm=>rm.id===lesson.room)?.name) && t.day === cand.day && t.period === cand.period);
              const isRoomBBusy = cand.room && (cand.room.includes("실") || cand.room.includes("관") || cand.room.startsWith("R5")) && data.timetable.some(t => (t.room === cand.room || t.room === data.rooms.find(rm=>rm.id===cand.room)?.name) && t.day === lesson.day && t.period === lesson.period);

              if (!isCandTeacherBusy && !isAbsentTeacherBusy && !isRoomABusy && !isRoomBBusy) {
                bestMatch = cand;
                break;
              }
            }

            generatedProposals.push({
              lesson,
              recommendation: bestMatch,
              status: bestMatch ? "possible" : "none"
            });
          });

          setProposals(generatedProposals);
        };

        const handleApplyBatch = () => {
          if (proposals.length === 0) return;
          if (!reason.trim()) {
            alert("일괄 교체 사유를 적어주세요.");
            return;
          }

          const confirmedProposals = proposals.filter(p => p.status === "possible" && p.recommendation);
          if (confirmedProposals.length === 0) {
            alert("적용 가능한 교체 추천안이 없습니다.");
            return;
          }

          confirmedProposals.forEach(p => {
            const detailsText = `[출장일정교환] ${p.lesson.grade}-${p.lesson.classNum}반 ${DAYS[p.lesson.day-1]}요일 ${p.lesson.period}교시(${p.lesson.subject}) ↔ ${DAYS[p.recommendation.day-1]}요일 ${p.recommendation.period}교시(${p.recommendation.subject})`;
            updateTableAndLogSwap({
              gradeA: p.lesson.grade, classA: p.lesson.classNum, dayA: p.lesson.day, periodA: p.lesson.period,
              gradeB: p.recommendation.grade, classB: p.recommendation.classNum, dayB: p.recommendation.day, periodB: p.recommendation.period,
              lessonA: p.lesson, lessonB: p.recommendation
            }, reason, detailsText);
          });

          alert("추천된 모든 출장 수업 교환 일정이 일괄 반영되었습니다.");
          setProposals([]);
          setReason("");
        };

        return (
          <div className="fade-in">
            <div className="view-header">
              <div className="view-title">
                <h1>출장 수업 일괄 스왑 추천</h1>
                <p>출장 시간을 입력하면 결강되는 여러 개의 수업들을 분석하여 한 번에 다른 날짜의 수업들과 충돌 없이 일괄 교체해 줍니다.</p>
              </div>
            </div>

            <div className="layout-split">
              <div>
                <div className="card">
                  <div className="card-title"><Icon name="calendarRange" /><span>출장 교사 및 기간 설정</span></div>
                  <div className="form-group">
                    <label className="form-label">출장(결강) 교사</label>
                    <select className="form-control" value={absentTeacher} onChange={e => setAbsentTeacher(e.target.value)}>
                      {data.teachers.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}
                    </select>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">출장 날짜</label>
                      <input className="form-control" type="date" value={date} onChange={e => setDate(e.target.value)} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">시작 교시</label>
                      <select className="form-control" value={startPeriod} onChange={e => setStartPeriod(Number(e.target.value))}>
                        {[1,2,3,4,5,6,7].map(p => <option key={p} value={p}>{p}교시</option>)}
                      </select>
                    </div>
                    <div className="form-group">
                      <label className="form-label">종료 교시</label>
                      <select className="form-control" value={endPeriod} onChange={e => setEndPeriod(Number(e.target.value))}>
                        {[1,2,3,4,5,6,7].map(p => <option key={p} value={p}>{p}교시</option>)}
                      </select>
                    </div>
                  </div>
                  <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={handleSearchSwaps}>
                    <Icon name="search" />
                    <span>출장 수업 스왑 추천안 탐색</span>
                  </button>
                </div>

                {proposals.length > 0 && (
                  <div className="card">
                    <div className="card-title"><span>출장 시간표 자동 매칭 추천안</span></div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                      {proposals.map((prop, idx) => (
                        <div key={idx} style={{ display: "flex", justifyContent: "space-between", border: "1px solid var(--border-color)", padding: "12px", borderRadius: "6px", background: "var(--bg-hover)", alignItems: "center" }}>
                          <div>
                            <strong>{prop.lesson.grade}-{prop.lesson.classNum}반 {prop.lesson.period}교시 ({prop.lesson.subject})</strong>
                            <div style={{ fontSize: "0.8rem", color: "var(--text-secondary)", marginTop: "4px" }}>
                              {prop.status === "possible" ? (
                                <span style={{ color: "var(--success)" }}>
                                  → {DAYS[prop.recommendation.day-1]}요일 {prop.recommendation.period}교시의 {prop.recommendation.subject} 수업과 맞교환 가능 ({prop.recommendation.teacher} 교사)
                                </span>
                              ) : (
                                <span style={{ color: "var(--danger)" }}>
                                  교사/시간 매칭 불가 (보강 교사 배정 필요)
                                </span>
                              )}
                            </div>
                          </div>
                          <span className={`badge ${prop.status === "possible" ? "badge-success" : "badge-danger"}`}>
                            {prop.status === "possible" ? "추천가능" : "매칭실패"}
                          </span>
                        </div>
                      ))}
                    </div>

                    <div className="form-group" style={{ marginTop: "20px" }}>
                      <label className="form-label">일괄 교체 사유</label>
                      <input className="form-control" type="text" placeholder="예) 최과학 교사 외부 출장으로 인한 일괄 보강 교체" value={reason} onChange={e => setReason(e.target.value)} />
                    </div>

                    <button className="btn btn-success" style={{ width: "100%", justifyContent: "center", marginTop: "10px" }} onClick={handleApplyBatch} disabled={!reason.trim()}>
                      <span>시간표 일괄 교체 적용</span>
                    </button>
                  </div>
                )}
              </div>

              <div>
                <div className="card">
                  <div className="card-title"><span>안내</span></div>
                  <p style={{ fontSize: "0.85rem", color: "var(--text-secondary)", lineHeight: "1.6" }}>
                    출장으로 인해 결강이 대량 발생할 때, 각각 1:1 교환을 일일이 검증할 필요 없이 해당 교사들의 다른 공강 시간대와 결강 수업을 자동으로 매칭하여 일괄 제안합니다. 충돌 없는 안전한 복수 교체가 한 번에 가능합니다.
                  </p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // Root App Component
      // ==========================================
      function App() {
        const [currentUser, setCurrentUser] = useState(null);
        const [view, setView] = useState("dashboard");
        const [theme, setTheme] = useState(localStorage.getItem("stm_theme") || "light");
        const [loading, setLoading] = useState(true);

        const [db, setDb] = useState({
          timetable: [],
          restrictions: [], reservations: [], swaps: [], substitutes: [], events: [],
          schools: [], users: [], settings: {}
        });

        // ------------------------------------------
        // Dynamic Metadata Extraction Logic
        // ------------------------------------------
        const calculatedDb = useMemo(() => {
          const timetable = db.timetable || [];
          
          // 1. Extract unique teachers
          const teacherSubjects = {};
          const teacherGrades = {};
          const teacherPeriods = {};
          
          timetable.forEach(item => {
            if (item.teacher && item.teacher !== "공강") {
              const name = item.teacher;
              
              if (!teacherSubjects[name]) teacherSubjects[name] = {};
              teacherSubjects[name][item.subject] = (teacherSubjects[name][item.subject] || 0) + 1;
              
              if (!teacherGrades[name]) teacherGrades[name] = {};
              teacherGrades[name][item.grade] = (teacherGrades[name][item.grade] || 0) + 1;
              
              teacherPeriods[name] = (teacherPeriods[name] || 0) + 1;
            }
          });
          
          const teachers = Object.keys(teacherPeriods).map((name, i) => {
            const subjects = teacherSubjects[name] || {};
            let bestSubject = "국어";
            let maxSubCount = 0;
            Object.keys(subjects).forEach(sub => {
              if (subjects[sub] > maxSubCount) {
                maxSubCount = subjects[sub];
                bestSubject = sub;
              }
            });

            const gradesMap = teacherGrades[name] || {};
            let bestGrade = 1;
            let maxGradeCount = 0;
            Object.keys(gradesMap).forEach(g => {
              if (gradesMap[g] > maxGradeCount) {
                maxGradeCount = gradesMap[g];
                bestGrade = Number(g);
              }
            });

            return {
              id: `T${String(i + 1).padStart(3, "0")}`,
              name,
              subject: bestSubject,
              grade: bestGrade,
              weeklyHours: teacherPeriods[name]
            };
          });

          const finalTeachers = teachers.length > 0 ? teachers : DEFAULT_TEACHERS;

          // 2. Extract unique rooms
          const roomSet = new Set();
          timetable.forEach(item => {
            if (item.room) roomSet.add(item.room);
          });
          (db.reservations || []).forEach(r => {
            if (r.roomId) roomSet.add(r.roomId);
          });

          const rooms = Array.from(roomSet).map((id, i) => {
            let type = "classroom";
            let name = id;
            
            const defRoom = DEFAULT_ROOMS.find(r => r.id === id || r.name === id);
            if (defRoom) {
              name = defRoom.name;
              type = defRoom.type;
            } else {
              if (id.includes("실") || id.includes("관") || id.includes("홀") || id.includes("운동장") || id.startsWith("R5")) {
                type = "special";
              }
            }
            return { id, name, type };
          });
          const finalRooms = rooms.length > 0 ? rooms : DEFAULT_ROOMS;

          // 3. Extract unique classes
          const classSet = new Set();
          timetable.forEach(item => {
            if (item.grade && item.classNum) {
              classSet.add(`${item.grade}-${item.classNum}`);
            }
          });

          const classes = Array.from(classSet).map(key => {
            const [gradeStr, classNumStr] = key.split("-");
            const grade = Number(gradeStr);
            const classNum = Number(classNumStr);
            const matchingRow = timetable.find(t => t.grade === grade && t.classNum === classNum && t.room);
            const room = matchingRow ? matchingRow.room : `R${grade}${String(classNum).padStart(2, "0")}`;

            return { id: `C${grade}${classNum}`, grade, classNum, room };
          });
          const finalClasses = classes.length > 0 ? classes : DEFAULT_CLASSES;

          return {
            ...db,
            teachers: finalTeachers,
            rooms: finalRooms,
            classes: finalClasses
          };
        }, [db]);

        useEffect(() => {
          async function loadData() {
            try {
              const fetched = await gasClient.getAllData();
              setDb(fetched);
            } catch (err) {
              console.error("Failed to load initial dataset", err);
            } finally {
              setLoading(false);
            }
          }
          loadData();
        }, []);

        useEffect(() => {
          const root = document.documentElement;
          if (theme === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          localStorage.setItem("stm_theme", theme);
        }, [theme]);

        const toggleTheme = () => setTheme(prev => prev === "dark" ? "light" : "dark");

        const syncTable = async (tableName, tableData) => {
          setDb(prev => ({ ...prev, [tableName]: tableData }));
          await gasClient.saveTable(tableName, tableData);
        };

        const updateTableAndLogSwap = async (swapDetails, reason, detailsText) => {
          const { gradeA, classA, dayA, periodA, gradeB, classB, dayB, periodB, lessonA, lessonB } = swapDetails;
          const updatedTimetable = [...db.timetable];

          const indexA = updatedTimetable.findIndex(t => t.grade === gradeA && t.classNum === classA && t.day === dayA && t.period === periodA);
          const indexB = updatedTimetable.findIndex(t => t.grade === gradeB && t.classNum === classB && t.day === dayB && t.period === periodB);

          const targetA = { subject: lessonB.subject === "공강" ? "" : lessonB.subject, teacher: lessonB.teacher, room: lessonB.room };
          const targetB = { subject: lessonA.subject === "공강" ? "" : lessonA.subject, teacher: lessonA.teacher, room: lessonA.room };

          if (indexA !== -1) updatedTimetable[indexA] = { ...updatedTimetable[indexA], ...targetA };
          else if (lessonB.subject !== "공강") updatedTimetable.push({ grade: gradeA, classNum: classA, day: dayA, period: periodA, ...targetA });

          if (indexB !== -1) updatedTimetable[indexB] = { ...updatedTimetable[indexB], ...targetB };
          else if (lessonA.subject !== "공강") updatedTimetable.push({ grade: gradeB, classNum: classB, day: dayB, period: periodB, ...targetB });

          const newLog = {
            id: `SW${String(db.swaps.length + 1).padStart(3, "0")}`,
            date: new Date().toISOString().split("T")[0],
            user: currentUser ? currentUser.name : "교무부 관리자",
            type: "1:1 교환",
            details: detailsText,
            reason,
            status: "승인 완료",
            timestamp: new Date().toLocaleString(),
            meta: {
              gradeA, classA, dayA, periodA, originalTeacherA: lessonA.teacher, originalSubjectA: lessonA.subject, originalRoomA: lessonA.room,
              gradeB, classB, dayB, periodB, originalTeacherB: lessonB.teacher, originalSubjectB: lessonB.subject, originalRoomB: lessonB.room
            }
          };

          await syncTable("timetable", updatedTimetable);
          await syncTable("swaps", [newLog, ...db.swaps]);
        };

        const restoreSwap = async (swapId) => {
          const idx = db.swaps.findIndex(s => s.id === swapId);
          if (idx === -1) return;
          const log = db.swaps[idx];
          if (!log.meta) return;

          const { gradeA, classA, dayA, periodA, originalTeacherA, originalSubjectA, originalRoomA,
                  gradeB, classB, dayB, periodB, originalTeacherB, originalSubjectB, originalRoomB } = log.meta;

          const updatedTimetable = [...db.timetable];

          const indexA = updatedTimetable.findIndex(t => t.grade === gradeA && t.classNum === classA && t.day === dayA && t.period === periodA);
          if (indexA !== -1) {
            updatedTimetable[indexA] = { ...updatedTimetable[indexA], subject: originalSubjectA === "공강" ? "" : originalSubjectA, teacher: originalTeacherA, room: originalRoomA };
          }

          const indexB = updatedTimetable.findIndex(t => t.grade === gradeB && t.classNum === classB && t.day === dayB && t.period === periodB);
          if (indexB !== -1) {
            updatedTimetable[indexB] = { ...updatedTimetable[indexB], subject: originalSubjectB === "공강" ? "" : originalSubjectB, teacher: originalTeacherB, room: originalRoomB };
          }

          const updatedSwaps = [...db.swaps];
          updatedSwaps[idx] = { ...log, status: "복구완료" };

          await syncTable("timetable", updatedTimetable);
          await syncTable("swaps", updatedSwaps);
        };

        const addSubstituteAssignment = async (assignment) => {
          const updatedTimetable = [...db.timetable];
          const [gStr, cStr] = assignment.className.split("-");
          const grade = Number(gStr);
          const classNum = Number(cStr);

          const index = updatedTimetable.findIndex(t => t.grade === grade && t.classNum === classNum && t.day === new Date(assignment.date).getDay() && t.period === assignment.period);

          let originalTeacher = "";
          let originalSubject = "";

          if (index !== -1) {
            originalTeacher = updatedTimetable[index].teacher;
            originalSubject = updatedTimetable[index].subject;

            updatedTimetable[index] = {
              ...updatedTimetable[index],
              teacher: assignment.subTeacher,
              subject: `${assignment.subject.split(" ")[0]} (보강)`
            };
          }

          const newLog = {
            id: `SB${String(db.substitutes.length + 1).padStart(3, "0")}`,
            ...assignment,
            status: "배정 완료",
            timestamp: new Date().toLocaleString(),
            meta: { grade, classNum, day: new Date(assignment.date).getDay(), period: assignment.period, originalTeacher, originalSubject }
          };

          await syncTable("timetable", updatedTimetable);
          await syncTable("substitutes", [newLog, ...db.substitutes]);
        };

        const restoreSubstitute = async (subId) => {
          const idx = db.substitutes.findIndex(s => s.id === subId);
          if (idx === -1) return;
          const log = db.substitutes[idx];
          if (!log.meta) return;

          const { grade, classNum, day, period, originalTeacher, originalSubject } = log.meta;
          const updatedTimetable = [...db.timetable];
          const index = updatedTimetable.findIndex(t => t.grade === grade && t.classNum === classNum && t.day === day && t.period === period);

          if (index !== -1) {
            updatedTimetable[index] = { ...updatedTimetable[index], teacher: originalTeacher, subject: originalSubject };
          }

          const updatedSubs = [...db.substitutes];
          updatedSubs[idx] = { ...log, status: "취소됨" };

          await syncTable("timetable", updatedTimetable);
          await syncTable("substitutes", updatedSubs);
        };

        const addReservation = async (res) => {
          const updatedRes = [...db.reservations, { id: db.reservations.length + 1, ...res }];
          await syncTable("reservations", updatedRes);
        };

        const addEvent = async (ev) => {
          const updatedEvents = [...db.events, { id: `EV${db.events.length + 1}`, ...ev }];
          await syncTable("events", updatedEvents);
        };

        const deleteEvent = async (evId) => {
          const updatedEvents = db.events.filter(e => e.id !== evId);
          await syncTable("events", updatedEvents);
        };

        const saveSettings = async (newSettings) => {
          await gasClient.saveSettings(newSettings);
          setDb(prev => ({ ...prev, settings: newSettings }));
        };

        const updateData = async (newData) => {
          setDb(prev => ({
            ...prev,
            timetable: newData.timetable,
            restrictions: newData.restrictions || prev.restrictions
          }));
          await syncTable("timetable", newData.timetable);
          if (newData.restrictions) {
            await syncTable("restrictions", newData.restrictions);
          }
        };

        const resetDatabase = async () => {
          await gasClient.resetDatabase();
        };

        const handleLogout = () => {
          setCurrentUser(null);
          setView("dashboard");
        };

        if (loading) {
          return (
            <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center", flexDirection: "column", backgroundColor: "var(--bg-app)", color: "var(--text-primary)" }}>
              <Icon name="school" size={64} className="glow-active" style={{ color: "var(--primary)", marginBottom: "20px" }} />
              <h2>시간표 관리 시스템 초기 데이터 로딩 중...</h2>
            </div>
          );
        }

        if (!currentUser) {
          return <LoginView onLoginSuccess={setCurrentUser} />;
        }

        const schoolName = currentUser.schoolName || "학교";
        const isAdmin = currentUser.role === "admin";

        return (
          <div className="app-container">
            <aside className="sidebar">
              <div className="sidebar-header">
                <div className="logo-icon">S</div>
                <div>
                  <span className="logo-text">{schoolName}</span>
                  <span className="logo-subtext">시간표 통합 관리</span>
                </div>
              </div>
              <ul className="sidebar-menu">
                <li className={`menu-item ${view === "dashboard" ? "active" : ""}`} onClick={() => setView("dashboard")}><Icon name="layoutGrid" /><span>종합 대시보드</span></li>
                <li className={`menu-item ${view === "viewer" ? "active" : ""}`} onClick={() => setView("viewer")}><Icon name="calendar" /><span>시간표 통합 조회</span></li>
                
                {isAdmin && (
                  <li className={`menu-item ${view === "upload" ? "active" : ""}`} onClick={() => setView("upload")}><Icon name="upload" /><span>엑셀 일괄 등록</span></li>
                )}

                <li className={`menu-item ${view === "swap" ? "active" : ""}`} onClick={() => setView("swap")}><Icon name="arrowLeftRight" /><span>1:1 수업 교체</span></li>
                <li className={`menu-item ${view === "trip" ? "active" : ""}`} onClick={() => setView("trip")}><Icon name="calendarRange" /><span>출장 스왑 추천</span></li>
                <li className={`menu-item ${view === "substitute" ? "active" : ""}`} onClick={() => setView("substitute")}><Icon name="userMinus" /><span>결강 & 보강 관리</span></li>
                <li className={`menu-item ${view === "reservation" ? "active" : ""}`} onClick={() => setView("reservation")}><Icon name="doorOpen" /><span>특별실 예약</span></li>
                <li className={`menu-item ${view === "events" ? "active" : ""}`} onClick={() => setView("events")}><Icon name="calendarRange" /><span>행사 일정 등록</span></li>
                <li className={`menu-item ${view === "history" ? "active" : ""}`} onClick={() => setView("history")}><Icon name="history" /><span>변경 이력 & 복구</span></li>
                <li className={`menu-item ${view === "stats" ? "active" : ""}`} onClick={() => setView("stats")}><Icon name="barChart3" /><span>시수 & 통계</span></li>
                
                {isAdmin && (
                  <li className={`menu-item ${view === "settings" ? "active" : ""}`} onClick={() => setView("settings")}><Icon name="settings" /><span>환경 설정</span></li>
                )}
              </ul>
              <div className="sidebar-footer">
                <div className="user-profile" style={{ cursor: "pointer" }} onClick={handleLogout} title="로그아웃하려면 클릭하세요">
                  <div className="avatar">{isAdmin ? "관" : "교"}</div>
                  <div className="profile-info">
                    <span className="profile-name">{currentUser.name}</span>
                    <span className="profile-role">{isAdmin ? "최고 관리자" : "일반 교사"}</span>
                  </div>
                </div>
                <button className="theme-toggle" onClick={toggleTheme}>
                  <Icon name={theme === "dark" ? "sun" : "moon"} />
                </button>
              </div>
            </aside>

            <main className="main-content">
              {view === "dashboard" && <Dashboard data={calculatedDb} setView={setView} />}
              {view === "viewer" && <TimetableViewer data={calculatedDb} />}
              {view === "upload" && <TimetableUpload data={calculatedDb} updateData={updateData} />}
              {view === "swap" && <SwapManager data={calculatedDb} updateTableAndLogSwap={updateTableAndLogSwap} />}
              {view === "trip" && <TripSwapManager data={calculatedDb} updateTableAndLogSwap={updateTableAndLogSwap} />}
              {view === "substitute" && <SubstituteManager data={calculatedDb} addSubstituteAssignment={addSubstituteAssignment} />}
              {view === "reservation" && <RoomReservation data={calculatedDb} addReservation={addReservation} />}
              {view === "events" && <EventManager data={calculatedDb} addEvent={addEvent} deleteEvent={deleteEvent} />}
              {view === "history" && <AuditLog data={calculatedDb} restoreSwap={restoreSwap} restoreSubstitute={restoreSubstitute} />}
              {view === "stats" && <StatsDashboard data={calculatedDb} />}
              {view === "settings" && <Settings settings={calculatedDb.settings} saveSettings={saveSettings} resetDatabase={resetDatabase} theme={theme} toggleTheme={toggleTheme} />}
            </main>
          </div>
        );
      }

      // Render React App to DOM
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
