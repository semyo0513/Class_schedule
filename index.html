<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학교 통합 시간표 관리 시스템 (STM)</title>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />

    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>

    <!-- Global CSS (Vanilla Custom Properties & Styles) -->
    <style>
      :root {
        --font-sans: 'Outfit', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        
        --bg-app: #f4f6fa;
        --bg-sidebar: #ffffff;
        --bg-card: #ffffff;
        --bg-hover: #f1f3f9;
        --bg-input: #ffffff;
        --border-color: #e2e8f0;
        
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-muted: #94a3b8;
        
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --primary-light: #e0e7ff;
        
        --success: #10b981;
        --success-light: #d1fae5;
        --warning: #f59e0b;
        --warning-light: #fef3c7;
        --danger: #ef4444;
        --danger-light: #fee2e2;
        
        --radius-sm: 6px;
        --radius-md: 12px;
        --radius-lg: 18px;
        --radius-full: 9999px;
        
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-glow: 0 0 15px rgba(79, 70, 229, 0.15);
      }

      .dark {
        --bg-app: #0b0f19;
        --bg-sidebar: #111827;
        --bg-card: #1f2937;
        --bg-hover: #2d3748;
        --bg-input: #1f2937;
        --border-color: #374151;
        
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --primary-light: #1e1b4b;
        
        --success: #34d399;
        --success-light: #064e3b;
        --warning: #fbbf24;
        --warning-light: #78350f;
        --danger: #f87171;
        --danger-light: #7f1d1d;
        
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
        --shadow-glow: 0 0 15px rgba(99, 102, 241, 0.2);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-app);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      button, input, select, textarea {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: var(--radius-full);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 5px rgba(79, 70, 229, 0.2); }
        50% { box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
      }
      .fade-in {
        animation: fadeIn 0.3s ease forwards;
      }
      .glow-active {
        animation: pulse-glow 2s infinite ease-in-out;
      }

      /* Main Grid Layout */
      .app-container {
        display: flex;
        min-height: 100vh;
        background-color: var(--bg-app);
      }

      /* Sidebar Component */
      .sidebar {
        width: 260px;
        background-color: var(--bg-sidebar);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        height: 100vh;
        position: sticky;
        top: 0;
        z-index: 10;
        transition: var(--transition);
      }
      .sidebar-header {
        padding: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border-color);
      }
      .logo-icon {
        background: linear-gradient(135deg, var(--primary), #a78bfa);
        color: white;
        width: 40px;
        height: 40px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        box-shadow: var(--shadow-glow);
      }
      .logo-text {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text-primary);
      }
      .logo-subtext {
        font-size: 0.75rem;
        color: var(--text-secondary);
        display: block;
        font-weight: 400;
      }
      .sidebar-menu {
        list-style: none;
        padding: 16px 12px;
        flex-grow: 1;
        overflow-y: auto;
      }
      .menu-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        color: var(--text-secondary);
        border-radius: var(--radius-md);
        cursor: pointer;
        margin-bottom: 4px;
        font-weight: 500;
        font-size: 0.95rem;
        transition: var(--transition);
      }
      .menu-item:hover {
        background-color: var(--bg-hover);
        color: var(--text-primary);
        transform: translateX(4px);
      }
      .menu-item.active {
        background-color: var(--primary-light);
        color: var(--primary);
      }
      .sidebar-footer {
        padding: 20px;
        border-top: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .avatar {
        width: 36px;
        height: 36px;
        background-color: var(--primary);
        color: white;
        border-radius: var(--radius-full);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .profile-info {
        display: flex;
        flex-direction: column;
      }
      .profile-name {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
      }
      .profile-role {
        font-size: 0.75rem;
        color: var(--text-secondary);
      }
      .theme-toggle {
        background: none;
        border: none;
        color: var(--text-secondary);
        padding: 8px;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: var(--transition);
      }
      .theme-toggle:hover {
        background-color: var(--bg-hover);
        color: var(--text-primary);
      }

      /* Main Viewport Content */
      .main-content {
        flex-grow: 1;
        padding: 40px;
        overflow-y: auto;
        height: 100vh;
      }
      .view-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
      }
      .view-title h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 4px;
      }
      .view-title p {
        color: var(--text-secondary);
        font-size: 0.95rem;
      }
      .header-actions {
        display: flex;
        gap: 12px;
      }

      /* Layout cards & elements */
      .card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 24px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 24px;
        transition: var(--transition);
      }
      .card:hover {
        box-shadow: var(--shadow-md);
      }
      .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: var(--radius-md);
        font-weight: 500;
        font-size: 0.9rem;
        cursor: pointer;
        border: 1px solid transparent;
        transition: var(--transition);
      }
      .btn:active { transform: scale(0.98); }
      .btn-primary { background-color: var(--primary); color: white; }
      .btn-primary:hover { background-color: var(--primary-hover); box-shadow: var(--shadow-glow); }
      .btn-secondary { background-color: var(--bg-hover); color: var(--text-primary); border-color: var(--border-color); }
      .btn-secondary:hover { background-color: var(--border-color); }
      .btn-success { background-color: var(--success); color: white; }
      .btn-success:hover { opacity: 0.9; }
      .btn-danger { background-color: var(--danger); color: white; }
      .btn-danger:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 24px;
      }
      .kpi-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: var(--shadow-sm);
      }
      .kpi-icon {
        width: 48px;
        height: 48px;
        border-radius: var(--radius-md);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .kpi-icon.primary { background-color: var(--primary-light); color: var(--primary); }
      .kpi-icon.success { background-color: var(--success-light); color: var(--success); }
      .kpi-icon.warning { background-color: var(--warning-light); color: var(--warning); }
      .kpi-icon.danger { background-color: var(--danger-light); color: var(--danger); }
      .kpi-content { display: flex; flex-direction: column; }
      .kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
      .kpi-label { font-size: 0.8rem; color: var(--text-secondary); }

      .layout-split {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 24px;
      }

      /* Timetable View Grid */
      .timetable-container { overflow-x: auto; }
      .timetable-grid {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        background-color: var(--bg-card);
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .timetable-grid th {
        background-color: var(--bg-hover);
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.875rem;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        text-align: center;
        width: 18%;
      }
      .timetable-grid th:first-child { width: 10%; }
      .timetable-grid td {
        border: 1px solid var(--border-color);
        padding: 12px;
        text-align: center;
        vertical-align: middle;
        height: 80px;
      }
      .timetable-cell {
        display: flex;
        flex-direction: column;
        justify-content: center;
        height: 100%;
        border-radius: var(--radius-sm);
        padding: 6px;
        transition: var(--transition);
      }
      .timetable-cell.active-lesson {
        background-color: var(--primary-light);
        border-left: 3px solid var(--primary);
      }
      .timetable-cell:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-sm);
      }
      .cell-subject { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
      .cell-sub-info {
        font-size: 0.75rem;
        color: var(--text-secondary);
        margin-top: 2px;
        display: flex;
        justify-content: center;
        gap: 4px;
      }
      .cell-room {
        background-color: var(--bg-hover);
        padding: 1px 4px;
        border-radius: var(--radius-sm);
        font-size: 0.7rem;
      }

      /* Tabs Components */
      .tabs-container {
        display: flex;
        gap: 8px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 20px;
        padding-bottom: 4px;
      }
      .tab-btn {
        padding: 8px 16px;
        border: none;
        background: none;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        border-radius: var(--radius-sm);
        transition: var(--transition);
      }
      .tab-btn:hover { color: var(--text-primary); background-color: var(--bg-hover); }
      .tab-btn.active { color: var(--primary); background-color: var(--primary-light); }

      /* Form Elements */
      .form-group { margin-bottom: 16px; }
      .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 6px;
      }
      .form-control {
        width: 100%;
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background-color: var(--bg-input);
        color: var(--text-primary);
        font-size: 0.9rem;
        transition: var(--transition);
      }
      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }
      .form-row { display: flex; gap: 16px; }
      .form-row > * { flex: 1; }

      /* Custom Badges */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: var(--radius-full);
        font-size: 0.75rem;
        font-weight: 500;
      }
      .badge-primary { background-color: var(--primary-light); color: var(--primary); }
      .badge-success { background-color: var(--success-light); color: var(--success); }
      .badge-warning { background-color: var(--warning-light); color: var(--warning); }
      .badge-danger { background-color: var(--danger-light); color: var(--danger); }
      .badge-secondary { background-color: var(--bg-hover); color: var(--text-secondary); }

      /* Upload drag & drop zone */
      .upload-zone {
        border: 2px dashed var(--border-color);
        border-radius: var(--radius-md);
        padding: 40px;
        text-align: center;
        cursor: pointer;
        background-color: var(--bg-app);
        transition: var(--transition);
      }
      .upload-zone:hover {
        border-color: var(--primary);
        background-color: var(--primary-light);
      }
      .upload-icon { color: var(--text-muted); margin-bottom: 12px; }

      /* Comparison Board Layout */
      .swap-comparison { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
      .swap-comparison-row {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        background-color: var(--bg-card);
        border-radius: var(--radius-sm);
        border-left: 3px solid var(--text-muted);
      }
      .swap-comparison-row.conflict { border-left-color: var(--danger); background-color: var(--danger-light); }
      .swap-comparison-row.success { border-left-color: var(--success); background-color: var(--success-light); }

      /* Lists & Tables */
      .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      .data-table th {
        text-align: left;
        padding: 12px;
        border-bottom: 2px solid var(--border-color);
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 0.85rem;
      }
      .data-table td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
      .data-table tr:hover { background-color: var(--bg-hover); }

      .conflict-list {
        background-color: var(--danger-light);
        border: 1px solid var(--danger);
        border-radius: var(--radius-sm);
        padding: 12px;
        color: var(--danger);
        margin-bottom: 16px;
        font-size: 0.85rem;
      }
      .conflict-list ul { padding-left: 18px; margin-top: 6px; }

      .rec-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
      .rec-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background-color: var(--bg-hover);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        transition: var(--transition);
      }
      .rec-score {
        font-size: 0.75rem;
        padding: 2px 6px;
        border-radius: var(--radius-sm);
        background-color: var(--primary);
        color: white;
        font-weight: bold;
      }

      /* Login Screen Panel */
      .login-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: var(--bg-app);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .login-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        width: 420px;
        max-width: 90%;
        padding: 32px;
        box-shadow: var(--shadow-lg);
        animation: fadeIn 0.3s ease;
      }
      .login-header {
        text-align: center;
        margin-bottom: 24px;
      }
      .login-header h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
      .login-header p { font-size: 0.85rem; color: var(--text-secondary); }
    </style>
  </head>

          return Promise.resolve(settings);

        async getAllData() {
          const settings = this.getSettings();
          if (settings.gasUrl) {
            const controller = new AbortController();
            // Fast failover timeout in 3 seconds (3000ms)
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            try {
              const response = await fetch(`${settings.gasUrl}?action=getAllData`, { signal: controller.signal });
              clearTimeout(timeoutId);
              if (!response.ok) throw new Error("GAS API Network Error");
              const json = await response.json();
              if (json.status === "success" && json.data) {
                Object.keys(json.data).forEach(key => {
                  setLocal(key, json.data[key]);
                });
                json.data.settings = settings;
                return json.data;
              }
            } catch (err) {
              clearTimeout(timeoutId);
              console.warn("GAS load failed or timed out. Falling back to local cache.", err);
            }
          }
          return {
            teachers: getLocal("teachers", DEFAULT_TEACHERS),
            rooms: getLocal("rooms", DEFAULT_ROOMS),
            classes: getLocal("classes", DEFAULT_CLASSES),

            users: getLocal("users", DEFAULT_USERS),
            settings: getLocal("settings", DEFAULT_SETTINGS)
          };
        },
        async saveTable(tableName, data) {
          const settings = this.getSettings();
          setLocal(tableName, data);
          if (settings.gasUrl) {
            try {
              await fetch(settings.gasUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "saveTable", table: tableName, data })
              });
            } catch (err) {
              console.error("Failed to push update to GAS:", err);
            }
          }
          return Promise.resolve({ status: "success" });
        },
        resetDatabase() {
          initializeDatabase(true);
          return Promise.resolve(true);
        }
      };

      // ==========================================
      // Trip Swap Manager Component (Batch Trip Swapping)
      // ==========================================
      function TripSwapManager({ data, updateTableAndLogSwap }) {
        const [absentTeacher, setAbsentTeacher] = useState(data.teachers[0]?.name || "");
        const [date, setDate] = useState("2026-06-25");
        const [startPeriod, setStartPeriod] = useState(1);
        const [endPeriod, setEndPeriod] = useState(4);
        const [reason, setReason] = useState("");
        const [proposals, setProposals] = useState([]);

        const DAYS = ["월", "화", "수", "목", "금"];
        const dayIdx = useMemo(() => {
          const day = new Date(date).getDay();
          return (day === 0 || day === 6) ? 1 : day;
        }, [date]);

        const handleSearchSwaps = () => {
          if (!absentTeacher) return;
          
          // Find all lessons for absentTeacher on this day between startPeriod and endPeriod
          const absentLessons = data.timetable.filter(
            t => t.teacher === absentTeacher && t.day === dayIdx && t.period >= startPeriod && t.period <= endPeriod
          );

          const generatedProposals = [];

          absentLessons.forEach(lesson => {
            // Find possible swap target slots in the timetable
            // Target slots must be for the SAME class (grade and classNum) to swap hours,
            // but in a different day and period, where the other teacher is free during lesson's period.
            const candidates = data.timetable.filter(
              t => t.grade === lesson.grade && t.classNum === lesson.classNum && !(t.day === lesson.day && t.period === lesson.period)
            );

            let bestMatch = null;

            for (let cand of candidates) {
              // Check if teacher collision happens:
              // 1. Can candidate's teacher teach in lesson's period (lesson.day, lesson.period)?
              //    He is free if he has NO classes scheduled in lesson's slot.
              const isCandTeacherBusy = data.timetable.some(
                t => t.teacher === cand.teacher && t.day === lesson.day && t.period === lesson.period
              );

              // 2. Can absent teacher teach in candidate's slot (cand.day, cand.period)?
              //    (Assumed he is back from trip on other days)
              const isAbsentTeacherBusy = data.timetable.some(
                t => t.teacher === absentTeacher && t.day === cand.day && t.period === cand.period
              );

              // 3. Room collisions check
              const isRoomABusy = lesson.room.startsWith("R5") && data.timetable.some(t => t.room === lesson.room && t.day === cand.day && t.period === cand.period);
              const isRoomBBusy = cand.room.startsWith("R5") && data.timetable.some(t => t.room === cand.room && t.day === lesson.day && t.period === lesson.period);

              if (!isCandTeacherBusy && !isAbsentTeacherBusy && !isRoomABusy && !isRoomBBusy) {
                // Perfect conflict-free swap candidate found!
                bestMatch = cand;
                break; // Take the first valid one
              }
            }

            generatedProposals.push({
              lesson,
              recommendation: bestMatch,
              status: bestMatch ? "possible" : "none"
            });
          });

          setProposals(generatedProposals);
        };

        const handleApplyBatch = () => {
          if (proposals.length === 0) return;
          if (!reason.trim()) {
            alert("일괄 교체 사유를 적어주세요.");
            return;
          }

          const confirmedProposals = proposals.filter(p => p.status === "possible" && p.recommendation);
          if (confirmedProposals.length === 0) {
            alert("적용 가능한 교체 추천안이 없습니다.");
            return;
          }

          confirmedProposals.forEach(p => {
            const detailsText = `[출장일정교환] ${p.lesson.grade}-${p.lesson.classNum}반 ${DAYS[p.lesson.day-1]}요일 ${p.lesson.period}교시(${p.lesson.subject}) ↔ ${DAYS[p.recommendation.day-1]}요일 ${p.recommendation.period}교시(${p.recommendation.subject})`;
            updateTableAndLogSwap({
              gradeA: p.lesson.grade, classA: p.lesson.classNum, dayA: p.lesson.day, periodA: p.lesson.period,
              gradeB: p.recommendation.grade, classB: p.recommendation.classNum, dayB: p.recommendation.day, periodB: p.recommendation.period,
              lessonA: p.lesson, lessonB: p.recommendation
            }, reason, detailsText);
          });

          alert("추천된 모든 출장 수업 교환 일정이 일괄 반영되었습니다.");
          setProposals([]);
          setReason("");
        };

        return (
          <div className="fade-in">
            <div className="view-header">
              <div className="view-title">
                <h1>출장 수업 일괄 스왑 추천</h1>
                <p>출장 시간을 입력하면 결강되는 여러 개의 수업들을 분석하여 한 번에 다른 날짜의 수업들과 충돌 없이 일괄 교체해 줍니다.</p>
              </div>
            </div>

            <div className="layout-split">
              <div>
                <div className="card">
                  <div className="card-title"><Icon name="calendarRange" /><span>출장 교사 및 기간 설정</span></div>
                  <div className="form-group">
                    <label className="form-label">출장(결강) 교사</label>
                    <select className="form-control" value={absentTeacher} onChange={e => setAbsentTeacher(e.target.value)}>
                      {data.teachers.map(t => <option key={t.id} value={t.name}>{t.name} ({t.subject})</option>)}
                    </select>
                  </div>
                  <div className="form-row">
                    <div className="form-group">
                      <label className="form-label">출장 날짜</label>
                      <input className="form-control" type="date" value={date} onChange={e => setDate(e.target.value)} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">시작 교시</label>
                      <select className="form-control" value={startPeriod} onChange={e => setStartPeriod(Number(e.target.value))}>
                        {[1,2,3,4,5,6,7].map(p => <option key={p} value={p}>{p}교시</option>)}
                      </select>
                    </div>
                    <div className="form-group">
                      <label className="form-label">종료 교시</label>
                      <select className="form-control" value={endPeriod} onChange={e => setEndPeriod(Number(e.target.value))}>
                        {[1,2,3,4,5,6,7].map(p => <option key={p} value={p}>{p}교시</option>)}
                      </select>
                    </div>
                  </div>
                  <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={handleSearchSwaps}>
                    <Icon name="search" />
                    <span>출장 수업 스왑 추천안 탐색</span>
                  </button>
                </div>

                {proposals.length > 0 && (
                  <div className="card">
                    <div className="card-title"><span>출장 시간표 자동 매칭 추천안</span></div>
                    <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
                      {proposals.map((prop, idx) => (
                        <div key={idx} style={{ display: "flex", justifyContent: "space-between", border: "1px solid var(--border-color)", padding: "12px", borderRadius: "6px", background: "var(--bg-hover)", alignItems: "center" }}>
                          <div>
                            <strong>{prop.lesson.grade}-{prop.lesson.classNum}반 {prop.lesson.period}교시 ({prop.lesson.subject})</strong>
                            <div style={{ fontSize: "0.8rem", color: "var(--text-secondary)", marginTop: "4px" }}>
                              {prop.status === "possible" ? (
                                <span style={{ color: "var(--success)" }}>
                                  → {DAYS[prop.recommendation.day-1]}요일 {prop.recommendation.period}교시의 {prop.recommendation.subject} 수업과 맞교환 가능 ({prop.recommendation.teacher} 교사)
                                </span>
                              ) : (
                                <span style={{ color: "var(--danger)" }}>
                                  교사/시간 매칭 불가 (보강 교사 배정 필요)
                                </span>
                              )}
                            </div>
                          </div>
                          <span className={`badge ${prop.status === "possible" ? "badge-success" : "badge-danger"}`}>
                            {prop.status === "possible" ? "추천가능" : "매칭실패"}
                          </span>
                        </div>
                      ))}
                    </div>

                    <div className="form-group" style={{ marginTop: "20px" }}>
                      <label className="form-label">일괄 교체 사유</label>
                      <input className="form-control" type="text" placeholder="예) 최과학 교사 외부 출장으로 인한 일괄 보강 교체" value={reason} onChange={e => setReason(e.target.value)} />
                    </div>

                    <button className="btn btn-success" style={{ width: "100%", justifyContent: "center", marginTop: "10px" }} onClick={handleApplyBatch} disabled={!reason.trim()}>
                      <span>시간표 일괄 교체 적용</span>
                    </button>
                  </div>
                )}
              </div>

              <div>
                <div className="card">
                  <div className="card-title"><span>안내</span></div>
                  <p style={{ fontSize: "0.85rem", color: "var(--text-secondary)", lineHeight: "1.6" }}>
                    출장으로 인해 결강이 대량 발생할 때, 각각 1:1 교환을 일일이 검증할 필요 없이 해당 교사들의 다른 공강 시간대와 결강 수업을 자동으로 매칭하여 일괄 제안합니다. 충돌 없는 안전한 복수 교체가 한 번에 가능합니다.
                  </p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // Root App Component
      // ==========================================
      function App() {
        const [currentUser, setCurrentUser] = useState(null);
        const [view, setView] = useState("dashboard");
        const [theme, setTheme] = useState(localStorage.getItem("stm_theme") || "light");
        const [loading, setLoading] = useState(true);

        const [db, setDb] = useState({
          teachers: [], rooms: [], classes: [], timetable: [],
          restrictions: [], reservations: [], swaps: [], substitutes: [], events: [],
          schools: [], users: [], settings: {}
        });

        useEffect(() => {
          async function loadData() {
            try {
              const fetched = await gasClient.getAllData();
              setDb(fetched);
            } catch (err) {
              console.error("Failed to load initial dataset", err);
            } finally {
              setLoading(false);
            }
          }
          loadData();
        }, []);

        useEffect(() => {
          const root = document.documentElement;
          if (theme === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          localStorage.setItem("stm_theme", theme);
        }, [theme]);

        const toggleTheme = () => setTheme(prev => prev === "dark" ? "light" : "dark");

        const syncTable = async (tableName, tableData) => {
          setDb(prev => ({ ...prev, [tableName]: tableData }));
          await gasClient.saveTable(tableName, tableData);
        };

        const updateTableAndLogSwap = async (swapDetails, reason, detailsText) => {
          const { gradeA, classA, dayA, periodA, gradeB, classB, dayB, periodB, lessonA, lessonB } = swapDetails;
          const updatedTimetable = [...db.timetable];

          const indexA = updatedTimetable.findIndex(t => t.grade === gradeA && t.classNum === classA && t.day === dayA && t.period === periodA);
          const indexB = updatedTimetable.findIndex(t => t.grade === gradeB && t.classNum === classB && t.day === dayB && t.period === periodB);

          const targetA = { subject: lessonB.subject === "공강" ? "" : lessonB.subject, teacher: lessonB.teacher, room: lessonB.room };
          const targetB = { subject: lessonA.subject === "공강" ? "" : lessonA.subject, teacher: lessonA.teacher, room: lessonA.room };

          if (indexA !== -1) updatedTimetable[indexA] = { ...updatedTimetable[indexA], ...targetA };
          else if (lessonB.subject !== "공강") updatedTimetable.push({ grade: gradeA, classNum: classA, day: dayA, period: periodA, ...targetA });

          if (indexB !== -1) updatedTimetable[indexB] = { ...updatedTimetable[indexB], ...targetB };
          else if (lessonA.subject !== "공강") updatedTimetable.push({ grade: gradeB, classNum: classB, day: dayB, period: periodB, ...targetB });

          const newLog = {
            id: `SW${String(db.swaps.length + 1).padStart(3, "0")}`,
            date: new Date().toISOString().split("T")[0],
            user: currentUser ? currentUser.name : "교무실 관리자",
            type: "1:1 교환",
            details: detailsText,
            reason,
            status: "승인 완료",
            timestamp: new Date().toLocaleString(),
            meta: {
              gradeA, classA, dayA, periodA, originalTeacherA: lessonA.teacher, originalSubjectA: lessonA.subject, originalRoomA: lessonA.room,
              gradeB, classB, dayB, periodB, originalTeacherB: lessonB.teacher, originalSubjectB: lessonB.subject, originalRoomB: lessonB.room
            }
          };

          await syncTable("timetable", updatedTimetable);
          await syncTable("swaps", [newLog, ...db.swaps]);
        };

        const restoreSwap = async (swapId) => {
          const idx = db.swaps.findIndex(s => s.id === swapId);
          if (idx === -1) return;
          const log = db.swaps[idx];
          if (!log.meta) return;

          const { gradeA, classA, dayA, periodA, originalTeacherA, originalSubjectA, originalRoomA,
                  gradeB, classB, dayB, periodB, originalTeacherB, originalSubjectB, originalRoomB } = log.meta;

          const updatedTimetable = [...db.timetable];

          const indexA = updatedTimetable.findIndex(t => t.grade === gradeA && t.classNum === classA && t.day === dayA && t.period === periodA);
          if (indexA !== -1) {
            updatedTimetable[indexA] = { ...updatedTimetable[indexA], subject: originalSubjectA === "공강" ? "" : originalSubjectA, teacher: originalTeacherA, room: originalRoomA };
          }

          const indexB = updatedTimetable.findIndex(t => t.grade === gradeB && t.classNum === classB && t.day === dayB && t.period === periodB);
          if (indexB !== -1) {
            updatedTimetable[indexB] = { ...updatedTimetable[indexB], subject: originalSubjectB === "공강" ? "" : originalSubjectB, teacher: originalTeacherB, room: originalRoomB };
          }

          const updatedSwaps = [...db.swaps];
          updatedSwaps[idx] = { ...log, status: "복구완료" };

          await syncTable("timetable", updatedTimetable);
          await syncTable("swaps", updatedSwaps);
        };

        const addSubstituteAssignment = async (assignment) => {
          const updatedTimetable = [...db.timetable];
          const [gStr, cStr] = assignment.className.split("-");
          const grade = Number(gStr);
          const classNum = Number(cStr);

          const index = updatedTimetable.findIndex(t => t.grade === grade && t.classNum === classNum && t.day === new Date(assignment.date).getDay() && t.period === assignment.period);

          let originalTeacher = "";
          let originalSubject = "";

          if (index !== -1) {
            originalTeacher = updatedTimetable[index].teacher;
            originalSubject = updatedTimetable[index].subject;

            updatedTimetable[index] = {
              ...updatedTimetable[index],
              teacher: assignment.subTeacher,
              subject: `${assignment.subject.split(" ")[0]} (보강)`
            };
          }

          const newLog = {
            id: `SB${String(db.substitutes.length + 1).padStart(3, "0")}`,
            ...assignment,
            status: "배정 완료",
            timestamp: new Date().toLocaleString(),
            meta: { grade, classNum, day: new Date(assignment.date).getDay(), period: assignment.period, originalTeacher, originalSubject }
          };

          await syncTable("timetable", updatedTimetable);
          await syncTable("substitutes", [newLog, ...db.substitutes]);
        };

        const restoreSubstitute = async (subId) => {
          const idx = db.substitutes.findIndex(s => s.id === subId);
          if (idx === -1) return;
          const log = db.substitutes[idx];
          if (!log.meta) return;

          const { grade, classNum, day, period, originalTeacher, originalSubject } = log.meta;
          const updatedTimetable = [...db.timetable];
          const index = updatedTimetable.findIndex(t => t.grade === grade && t.classNum === classNum && t.day === day && t.period === period);

          if (index !== -1) {
            updatedTimetable[index] = { ...updatedTimetable[index], teacher: originalTeacher, subject: originalSubject };
          }

          const updatedSubs = [...db.substitutes];
          updatedSubs[idx] = { ...log, status: "취소됨" };

          await syncTable("timetable", updatedTimetable);
          await syncTable("substitutes", updatedSubs);
        };

        const addReservation = async (res) => {
          const updatedRes = [...db.reservations, { id: db.reservations.length + 1, ...res }];
          await syncTable("reservations", updatedRes);
        };

        const addEvent = async (ev) => {
          const updatedEvents = [...db.events, { id: `EV${db.events.length + 1}`, ...ev }];
          await syncTable("events", updatedEvents);
        };

        const deleteEvent = async (evId) => {
          const updatedEvents = db.events.filter(e => e.id !== evId);
          await syncTable("events", updatedEvents);
        };

        const saveSettings = async (newSettings) => {
          await gasClient.saveSettings(newSettings);
          setDb(prev => ({ ...prev, settings: newSettings }));
        };

        const updateData = async (newData) => {
          setDb(prev => ({ ...prev, ...newData }));
          await gasClient.saveTable("teachers", newData.teachers);
          await gasClient.saveTable("rooms", newData.rooms);
          await syncTable("classes", newData.classes);
          await syncTable("timetable", newData.timetable);
          await syncTable("restrictions", newData.restrictions);
        };

        const resetDatabase = async () => {
          await gasClient.resetDatabase();
        };

        const handleLogout = () => {
          setCurrentUser(null);
          setView("dashboard");
        };

        if (loading) {
          return (
            <div style={{ display: "flex", height: "100vh", alignItems: "center", justifyContent: "center", flexDirection: "column", backgroundColor: "var(--bg-app)", color: "var(--text-primary)" }}>
              <Icon name="school" size={64} className="glow-active" style={{ color: "var(--primary)", marginBottom: "20px" }} />
              <h2>시간표 관리 시스템 초기 데이터 로딩 중...</h2>
            </div>
          );
        }

        // If not logged in, show the login screen
        if (!currentUser) {
          return <LoginView onLoginSuccess={setCurrentUser} />;
        }

        const schoolName = currentUser.schoolName || "학교";
        const isAdmin = currentUser.role === "admin";

        return (
          <div className="app-container">
            <aside className="sidebar">
              <div className="sidebar-header">
                <div className="logo-icon">S</div>
                <div>
                  <span className="logo-text">{schoolName}</span>
                  <span className="logo-subtext">시간표 통합 관리</span>
                </div>
              </div>
              <ul className="sidebar-menu">
                <li className={`menu-item ${view === "dashboard" ? "active" : ""}`} onClick={() => setView("dashboard")}><Icon name="layoutGrid" /><span>종합 대시보드</span></li>
                <li className={`menu-item ${view === "viewer" ? "active" : ""}`} onClick={() => setView("viewer")}><Icon name="calendar" /><span>시간표 통합 조회</span></li>
                
                {isAdmin && (
                  <li className={`menu-item ${view === "upload" ? "active" : ""}`} onClick={() => setView("upload")}><Icon name="upload" /><span>엑셀 일괄 등록</span></li>
                )}

                <li className={`menu-item ${view === "swap" ? "active" : ""}`} onClick={() => setView("swap")}><Icon name="arrowLeftRight" /><span>1:1 수업 교체</span></li>
                <li className={`menu-item ${view === "trip" ? "active" : ""}`} onClick={() => setView("trip")}><Icon name="calendarRange" /><span>출장 스왑 추천</span></li>
                <li className={`menu-item ${view === "substitute" ? "active" : ""}`} onClick={() => setView("substitute")}><Icon name="userMinus" /><span>결강 & 보강 관리</span></li>
                <li className={`menu-item ${view === "reservation" ? "active" : ""}`} onClick={() => setView("reservation")}><Icon name="doorOpen" /><span>특별실 예약</span></li>
                <li className={`menu-item ${view === "events" ? "active" : ""}`} onClick={() => setView("events")}><Icon name="calendarRange" /><span>행사 일정 등록</span></li>
                <li className={`menu-item ${view === "history" ? "active" : ""}`} onClick={() => setView("history")}><Icon name="history" /><span>변경 이력 & 복구</span></li>
                <li className={`menu-item ${view === "stats" ? "active" : ""}`} onClick={() => setView("stats")}><Icon name="barChart3" /><span>시수 & 통계</span></li>
                
                {isAdmin && (
                  <li className={`menu-item ${view === "settings" ? "active" : ""}`} onClick={() => setView("settings")}><Icon name="settings" /><span>환경 설정</span></li>
                )}
              </ul>
              <div className="sidebar-footer">
                <div className="user-profile" style={{ cursor: "pointer" }} onClick={handleLogout} title="로그아웃하려면 클릭하세요">
                  <div className="avatar">{isAdmin ? "관" : "교"}</div>
                  <div className="profile-info">
                    <span className="profile-name">{currentUser.name}</span>
                    <span className="profile-role">{isAdmin ? "최고 관리자" : "일반 교사"}</span>
                  </div>
                </div>
                <button className="theme-toggle" onClick={toggleTheme}>
                  <Icon name={theme === "dark" ? "sun" : "moon"} />
                </button>
              </div>
            </aside>

            <main className="main-content">
              {view === "dashboard" && <Dashboard data={db} setView={setView} />}
              {view === "viewer" && <TimetableViewer data={db} />}
              {view === "upload" && <TimetableUpload data={db} updateData={updateData} />}
              {view === "swap" && <SwapManager data={db} updateTableAndLogSwap={updateTableAndLogSwap} />}
              {view === "trip" && <TripSwapManager data={db} updateTableAndLogSwap={updateTableAndLogSwap} />}
              {view === "substitute" && <SubstituteManager data={db} addSubstituteAssignment={addSubstituteAssignment} />}
              {view === "reservation" && <RoomReservation data={db} addReservation={addReservation} />}
              {view === "events" && <EventManager data={db} addEvent={addEvent} deleteEvent={deleteEvent} />}
              {view === "history" && <AuditLog data={db} restoreSwap={restoreSwap} restoreSubstitute={restoreSubstitute} />}
              {view === "stats" && <StatsDashboard data={db} />}
              {view === "settings" && <Settings settings={db.settings} saveSettings={saveSettings} resetDatabase={resetDatabase} theme={theme} toggleTheme={toggleTheme} />}
            </main>
          </div>
        );
      }

      // Render React App to DOM
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
